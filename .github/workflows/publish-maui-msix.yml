name: Publish MAUI MSIX

on:
  push:
    tags:
      - "maui-v*.*.*"
  workflow_dispatch:
    inputs:
      app_version:
        description: "MAUI app display version, for example 1.0.0"
        required: true
        default: "1.0.0"
      app_build:
        description: "Windows package build number. Defaults to the GitHub run number when empty."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish-msix:
    runs-on: windows-latest

    env:
      PROJECT_PATH: apps/maui/ReadableHttp.App.Maui/ReadableHttp.App.Maui.csproj
      TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      RUNTIME_IDENTIFIER: win-x64
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore $env:PROJECT_PATH

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $appVersion = "${{ inputs.app_version }}"
          if ([string]::IsNullOrWhiteSpace($appVersion) -and $env:GITHUB_REF_TYPE -eq "tag") {
            $appVersion = $env:GITHUB_REF_NAME -replace "^maui-v", ""
          }
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            $appVersion = "1.0.0"
          }

          $versionParts = $appVersion.Split(".")
          if ($versionParts.Length -lt 3) {
            throw "app_version must have at least three numeric parts, for example 1.0.0."
          }

          $displayVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"
          $build = "${{ inputs.app_build }}"
          if ([string]::IsNullOrWhiteSpace($build)) {
            $build = $env:GITHUB_RUN_NUMBER
          }

          if ($displayVersion -notmatch "^\d+\.\d+\.\d+$") {
            throw "app_version must be numeric, for example 1.0.0."
          }
          if ($build -notmatch "^\d+$") {
            throw "app_build must be numeric."
          }

          $packageVersion = "$displayVersion.$build"
          "display-version=$displayVersion" >> $env:GITHUB_OUTPUT
          "build=$build" >> $env:GITHUB_OUTPUT
          "package-version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH --runtime $env:RUNTIME_IDENTIFIER

      - name: Publish MSIX
        shell: pwsh
        run: |
          $outputPath = Join-Path $env:GITHUB_WORKSPACE "publish/maui"
          New-Item -ItemType Directory -Force -Path $outputPath | Out-Null

          $signingArgs = @("-p:AppxPackageSigningEnabled=false")
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64)) {
            $certificatePath = Join-Path $env:RUNNER_TEMP "readablehttp-msix-signing.pfx"
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            $signingArgs = @(
              "-p:AppxPackageSigningEnabled=true",
              "-p:PackageCertificateKeyFile=$certificatePath",
              "-p:PackageCertificatePassword=$env:WINDOWS_PFX_PASSWORD"
            )
          }

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --framework $env:TARGET_FRAMEWORK `
            --runtime $env:RUNTIME_IDENTIFIER `
            --no-restore `
            -p:WindowsPackageType=MSIX `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageDir="$outputPath\" `
            -p:ApplicationDisplayVersion="${{ steps.version.outputs.display-version }}" `
            -p:ApplicationVersion="${{ steps.version.outputs.build }}" `
            @signingArgs

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: readablehttp-maui-msix-${{ steps.version.outputs.package-version }}
          path: |
            publish/maui/**/*.msix
            publish/maui/**/*.msixbundle
            publish/maui/**/*.appinstaller
            publish/maui/**/*.cer
          if-no-files-found: error
